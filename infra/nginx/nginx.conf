upstream api {
    server api:8000;
}

upstream web {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # Forward /api/* to FastAPI
    location /api/ {
        proxy_pass         http://api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Forward /metrics to FastAPI (internal only — block in prod)
    location /metrics {
        proxy_pass http://api;
        allow 172.16.0.0/12;  # Docker internal network
        deny  all;
    }

    # Everything else to Next.js
    location / {
        proxy_pass         http://web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}